ï»¿<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="windows-1252">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gasto Tracker</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <div class="app-title-text">Gasto Tracker</div>
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-btn">Modo Oscuro</button>
        </div>

        <div class="app-content">
            
            <div id="screen-login" class="screen active">
                <h2>Iniciar Sesion</h2>
                
                <div style="font-size:0.75rem; color:#7f8c8d; margin-bottom:15px; text-align:center; font-weight:500;">
                    Casos de prueba: admin@gmail.com (123456) o user@yahoo.com (password)
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" required placeholder="ejemplo@gmail.com" oninput="validateEmailField()">
                        <div id="login-email-error" class="error-message">Ingresa un correo valido (Gmail, Yahoo, Outlook, Hotmail, etc.).</div>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Contrasena:</label>
                        <input type="password" id="login-password" required placeholder="******">
                    </div>
                    
                    <button type="submit" class="btn">Iniciar sesion</button>

                    <span class="btn-fake" onclick="alert('Funcion no disponible')">Registrarse</span>

                    <span class="btn-fake" onclick="alert('Funcion no disponible')">Olvide mi contrasena?</span>
                </form>
            </div>

            <div id="screen-success" class="screen">
                <div class="success-box">
                    <p>Ingreso exitoso</p>
                    <button class="btn" onclick="logout()">Cerrar sesion</button>
                </div>
            </div>

        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
